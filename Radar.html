<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBurner v3.0 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { color: #58a6ff; text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 900px; margin: 0 auto; }
        .panel { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; }
        .header-stats { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; }
        .ping { color: #eed535; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .interface-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .interface-card { background-color: #21262d; padding: 15px; border-radius: 6px; border-left: 4px solid #58a6ff; }
        .interface-card h3 { margin-top: 0; color: #8b949e; font-size: 1em; word-wrap: break-word; }
        .rx { color: #3fb950; margin: 5px 0; }
        .tx { color: #f85149; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🌐 NetBurner v3.0 Pro</h1>
    
    <div class="dashboard">
        <div class="panel header-stats">
            <span id="status">🔴 Buscando Señal...</span>
            <span id="ping" class="ping">Latencia: -- ms</span>
        </div>

        <div class="panel">
            <div class="chart-container">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>

        <div id="interfaces" class="interface-grid">
            </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE LA GRÁFICA (Chart.js) ===
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const trafficChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Tiempo
                datasets: [
                    { label: 'Total Descarga (MB/s)', borderColor: '#3fb950', backgroundColor: 'rgba(63, 185, 80, 0.1)', data: [], fill: true, tension: 0.3, borderWidth: 2 },
                    { label: 'Total Subida (MB/s)', borderColor: '#f85149', backgroundColor: 'rgba(248, 81, 73, 0.1)', data: [], fill: true, tension: 0.3, borderWidth: 2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false, // Apagamos la animación para que fluya en tiempo real sin laguear
                scales: {
                    x: { display: false },
                    y: { beginAtZero: true, title: { display: true, text: 'Megabytes por Segundo', color: '#c9d1d9' }, ticks: { color: '#8b949e' } }
                },
                plugins: { legend: { labels: { color: '#c9d1d9' } } }
            }
        });

        // === CONEXIÓN AL MOTOR PYTHON ===
        const ws = new WebSocket("ws://100.100.187.34:8765");

        ws.onopen = () => {
            document.getElementById('status').innerHTML = "🟢 Conexión Establecida";
            document.getElementById('status').style.color = "#3fb950";
        };

        ws.onclose = () => {
            document.getElementById('status').innerHTML = "🔴 Motor Apagado";
            document.getElementById('status').style.color = "#f85149";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const interfacesDiv = document.getElementById('interfaces');
            interfacesDiv.innerHTML = ''; 
            
            let totalRx = 0;
            let totalTx = 0;

            for (const [interfaz, stats] of Object.entries(data)) {
                // 1. Extraer y mostrar el Ping global
                if (interfaz === "_global_") {
                    const pingVal = stats.ping === 999 ? "Sin Red" : `${stats.ping} ms`;
                    document.getElementById('ping').innerText = `Latencia: ${pingVal}`;
                    continue; // Saltamos a la siguiente lectura, el ping no es una tarjeta
                }

                // 2. Sumar el tráfico para la gráfica general
                totalRx += stats.rx;
                totalTx += stats.tx;

                // 3. Crear las tarjetas individuales
                const card = document.createElement('div');
                card.className = 'interface-card';
                card.innerHTML = `
                    <h3>${interfaz}</h3>
                    <p class="rx">⬇ Bajada: <b>${stats.rx.toFixed(2)}</b> MB/s</p>
                    <p class="tx">⬆ Subida: <b>${stats.tx.toFixed(2)}</b> MB/s</p>
                `;
                interfacesDiv.appendChild(card);
            }

            // 4. Actualizar la Gráfica en vivo
            const now = new Date().toLocaleTimeString();
            trafficChart.data.labels.push(now);
            trafficChart.data.datasets[0].data.push(totalRx);
            trafficChart.data.datasets[1].data.push(totalTx);

            // Mantener solo los últimos 30 segundos en pantalla (efecto radar de barrido)
            if (trafficChart.data.labels.length > 30) {
                trafficChart.data.labels.shift();
                trafficChart.data.datasets[0].data.shift();
                trafficChart.data.datasets[1].data.shift();
            }
            
            trafficChart.update();
        };
    </script>
</body>
</html>
